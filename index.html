<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LIMBUS COMPANY</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="image/webp" href="img/limlogo.webp">
</head>

<body>
    <h2 style="color: white;">Limbus Company</h2>
    <div class="container" id="container">
        <div class="form-container sign-in-container">
            <form id="login-form">
                <h1 style="color: white;">Login</h1>
                <span style="color: white;">and join our company</span>
                <input type="email" name="email" placeholder="Email" required />
                <input type="password" name="password" placeholder="Password" required />
                <a style="color: white;" href="./forgot.html">Forgot your password?</a>
                <button type="submit">Login</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-right">
                    <h1>Welcome Back, Manager!</h1>
                    <p>Enter your personal details and start journey with us</p>
                    <a href="./register.html">
                        <button class="ghost" id="signUp">Sign Up</button>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script>
        let loginForm = document.querySelector("#login-form");

        loginForm.addEventListener("submit", (e) => {
            e.preventDefault();

            let email = loginForm.email.value.trim();
            let password = loginForm.password.value.trim();
            let users = JSON.parse(localStorage.getItem("users")) || [];
            let user = users.find(u => u.email === email && u.password === password);

            if (user) {
                localStorage.setItem("currentUser", JSON.stringify({
                    email: user.email,
                    username: user.username
                }));
                alert("Welcome back, Manager.");
                window.location.href = "./main.html";
            } else {
                alert("Check your password or email.");
            }
        });
    </script>
</body>

</html>
