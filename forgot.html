<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - LIMBUS COMPANY</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="images/webp" href="img/limlogo.webp">
</head>

<body>
    <h2 style="color: white;">Limbus Company</h2>
    <div class="container" id="container">
        <div class="form-container sign-in-container">
            <form id="forgot-password-form">
                <h1 style="color: white;">Forgot Password</h1>
                <span style="color: white;">Don't worry, just type your email and your new password will be
                    executed</span>
                <input type="email" id="reset-email" placeholder="Email" required />
                <input type="password" id="new-password" placeholder="New Password" required />
                <input type="password" id="confirm-new-password" placeholder="Confirm Password" required />
                <button type="submit">Confirm</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Manager!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <a href="./index.html">
                        <button class="ghost" id="signUp">Login</button>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const forgotForm = document.querySelector("#forgot-password-form");

        forgotForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const email = document.querySelector("#reset-email").value.trim();
            const newPassword = document.querySelector("#new-password").value.trim();
            const confirmPassword = document.querySelector("#confirm-new-password").value.trim();
            if (newPassword !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            let users = JSON.parse(localStorage.getItem("users")) || [];
            const userIndex = users.findIndex(u => u.email === email);

            if (userIndex !== -1) {
                users[userIndex].password = newPassword;
                localStorage.setItem("users", JSON.stringify(users));
                alert("Password updated successfully, Manager.");
                window.location.href = "./login.html";
            } else {
                alert("Email not found in our records!");
            }
        });
    </script>
</body>

</html>
