<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LIMBUS COMPANY</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="images/webp" href="img/limlogo.webp">
</head>

<body>
    <h2 style="color: white;">Limbus Company</h2>
    <div class="container" id="container">
        <div class="form-container sign-in-container">
            <form action="./index.html">
                <h1 style="color: white;">Login</h1>
                <span style="color: white;">and join our company</span>
                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Password" />
                <a style="color: white;" href="./forgot.html">Forgot your password?</a>
                <button>Login</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-right">
                    <h1>Welcome Back, Manager!</h1>
                    <p>Enter your personal details and start journey with us</p>
                    <button class="ghost" id="signUp"><a style="color: #F1BF01;" href="./register.html">Sign Up</button></a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
