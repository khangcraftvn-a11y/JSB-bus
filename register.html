<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LIMBUS COMPANY</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="image/webp" href="img/limlogo.webp">
</head>

<body>
    <h2 style="color: white;">Limbus Company</h2>
    <div class="container" id="container">
        <div class="form-container sign-in-container">
            <form id="register-form">
                <h1 style="color: white;">Sign up</h1>
                <span style="color: white;">We're really grateful for your trust in us</span>
                <input type="text" id="fullName" name="fullName" placeholder="Name" required />
                <input type="email" id="email" name="email" placeholder="Email" required />
                <input type="password" id="password" name="password" placeholder="Password" required />
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password"
                    required />
                <a style="color: white;" href="./login.html">Already have an account?</a>
                <button type="submit">Sign up</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Manager!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <a href="./index.html">
                        <button class="ghost" id="signUp">Login</button>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.querySelector("#register-form");

        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const name = document.querySelector("#fullName").value.trim();
            const email = document.querySelector("#email").value.trim().toLowerCase(); // Convert to lowercase for safety
            const password = document.querySelector("#password").value.trim();
            const confirmPassword = document.querySelector("#confirmPassword").value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }
            const users = JSON.parse(localStorage.getItem("users")) || [];
            const emailExists = users.some(u => u.email === email);

            if (emailExists) {
                alert("This email is already signed up!");
                return;
            }
            const newUser = {
                username: name,
                email: email,
                password: password,
                lunacy: 0,
                inventory: {},
                equippedTag: null
            };

            users.push(newUser);
            localStorage.setItem("users", JSON.stringify(users));

            alert("Yippeee!!! Account created successfully.");
            window.location.href = "./index.html";
        });
    </script>
</body>

</html>
