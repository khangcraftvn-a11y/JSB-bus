<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LIMBUS COMPANY</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="images/webp" href="img/limlogo.webp">
</head>

<body>
    <h2 style="color: white;">Limbus Company</h2>
    <div class="container" id="container">
        <div class="form-container sign-in-container">
            <form action="./index.html">
                <h1 style="color: white;">Sign up</h1>
                <span style="color: white;">we're really welcome for your trust in us</span>
                <input type="text" placeholder="Name" />
                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Password" />
                <a style="color: white;" href="./login.html">Already had an account?</a>
                <button>Sign up</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Manager!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="ghost" id="signUp"><a style="color: #F1BF01;" href="./login.html">Login</button></a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
